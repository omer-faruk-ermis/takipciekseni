<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Takipçi Paketleri</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1f2937 0%, #050505 45%, #000 100%);
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .page {
            width: 100%;
            max-width: 760px;
            text-align: center;
        }

        .image-card {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 22px;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        .price-image {
            width: 100%;
            display: block;
            border-radius: 16px;
        }

        .whatsapp-button {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            font-size: 22px;
            font-weight: 700;
            padding: 16px 28px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .whatsapp-button:hover {
            background: #1ebe5d;
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(37, 211, 102, 0.48);
        }

        .whatsapp-icon {
            width: 30px;
            height: 30px;
        }

        @media (max-width: 600px) {
            body {
                padding: 18px 10px;
            }

            .page {
                max-width: 100%;
            }

            .image-card {
                padding: 6px;
                border-radius: 16px;
            }

            .price-image {
                border-radius: 12px;
            }

            .whatsapp-button {
                width: 100%;
                font-size: 18px;
                padding: 15px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="image-card">
            <!-- Görsel dosyasını bu HTML ile aynı klasöre koyup adını takipci-paketleri.jpg yap -->
            <img class="price-image" src="takipci-paketleri.JPG" alt="Takipçi Paketleri" />
        </div>

        <a
            class="whatsapp-button"
            href="https://wa.me/905383514626?text=Takip%C3%A7i%20sat%C4%B1n%20almak%20istiyorum"
            target="_blank"
            rel="noopener noreferrer"
        >
            <svg class="whatsapp-icon" viewBox="0 0 32 32" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M16.02 3C8.84 3 3 8.73 3 15.78c0 2.26.61 4.47 1.77 6.4L3 29l7-1.81A13.14 13.14 0 0 0 16.02 28C23.2 28 29 22.27 29 15.22 29 8.17 23.2 3 16.02 3Zm0 22.83c-1.9 0-3.75-.5-5.38-1.46l-.39-.23-4.15 1.07 1.11-4.01-.25-.41a10.57 10.57 0 0 1-1.61-5.01c0-5.86 4.86-10.63 10.67-10.63 5.8 0 10.62 4.25 10.62 10.07 0 5.86-4.82 10.61-10.62 10.61Zm5.84-7.94c-.32-.16-1.9-.92-2.19-1.03-.29-.11-.5-.16-.71.16-.21.31-.82 1.02-1 1.23-.18.21-.37.24-.68.08-.32-.16-1.35-.49-2.57-1.55-.95-.84-1.59-1.88-1.78-2.19-.18-.31-.02-.48.14-.64.14-.14.32-.37.47-.55.16-.18.21-.31.32-.52.11-.21.05-.39-.03-.55-.08-.16-.71-1.69-.97-2.31-.26-.61-.52-.53-.71-.54h-.61c-.21 0-.55.08-.84.39-.29.31-1.1 1.07-1.1 2.6s1.13 3.02 1.29 3.23c.16.21 2.23 3.35 5.4 4.69.75.32 1.34.51 1.8.65.76.24 1.45.21 2 .13.61-.09 1.9-.76 2.17-1.49.26-.73.26-1.36.18-1.49-.08-.13-.29-.21-.61-.37Z"/>
            </svg>
            WhatsApp ile İletişime Geç
        </a>
    </main>
</body>
</html>
